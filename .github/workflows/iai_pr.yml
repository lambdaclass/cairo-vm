name: Benchmark PR (iai)

on:
  pull_request:
    branches: [ '**' ]

jobs:
  fetch-iai-results:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
    - name: Initialize IAI cache for ${{ github.event.pull_request.base.sha }}
      uses: actions/cache@v3
      id: cache-iai-results
      with:
        path: |
          */target/iai/iai_benchmark/
        key: ${{ runner.os }}-iai-benchmark-cache-${{ github.event.pull_request.base.sha }}
        lookup-only: true

    - name: Install Rust
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      uses: dtolnay/rust-toolchain@1.86.0
    - name: Set up cargo cache
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      uses: Swatinem/rust-cache@v2
    - name: Install uv
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      uses: astral-sh/setup-uv@v5
      with:
          enable-cache: true
    - name: Set python env
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      run: uv python install 3.9.15 && uv python pin 3.9.15
    - name: Install python dependencies
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      run: uv pip install --system -r requirements.txt
    - name: Install test dependencies
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      run: |
        sudo apt update
        sudo apt install -y valgrind
        cargo install --version 0.3.1 iai-callgrind-runner

    - name: Run iai benchmarks
      if: ${{ steps.cache-iai-results.outputs.cache-hit != 'true' }}
      run: make iai-benchmark-action

  run-iai-benchmark:
    needs: fetch-iai-results
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.86.0
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
          enable-cache: true
    - name: Install python deps
      run: make deps-python && . cairo-vm-env/bin/activate && echo PATH=$PATH >> $GITHUB_ENV
    - name: Install test dependencies
      run: |
        sudo apt update
        sudo apt install -y valgrind
        cargo install --version 0.3.1 iai-callgrind-runner

    - name: Restore cache for ${{ github.event.pull_request.base.sha }}
      uses: actions/cache/restore@v3
      with:
        path: |
          */target/iai/iai_benchmark/
        key: ${{ runner.os }}-iai-benchmark-cache-${{ github.event.pull_request.base.sha }}
        fail-on-cache-miss: true

    - name: Run iai benchmarks
      run: make iai-benchmark-action
